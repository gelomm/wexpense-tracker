<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WeXpense</title>
    <script>
      (function() {
        // Get the path that was requested
        const path = window.location.pathname.replace('/wexpense-tracker', '');
        if (path && path !== '/') {
          // Redirect to index.html with the path as a query param
          window.location.href = '/wexpense-tracker/?path=' + encodeURIComponent(path);
        } else {
          window.location.href = '/wexpense-tracker/';
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
